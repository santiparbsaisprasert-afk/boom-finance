<style>
:root{--bg:#0A0A0F;--card:rgba(255,255,255,0.03);--card-border:rgba(255,255,255,0.06);--green:#00E676;--red:#FF5252;--text:#fff;--text-dim:#aaa;--text-muted:#666;--text-dark:#444}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Noto Sans Thai',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;overscroll-behavior:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
input,textarea,select,button{font-family:'Noto Sans Thai',sans-serif}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes popIn{0%{opacity:0;transform:scale(.85)}100%{opacity:1;transform:scale(1)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 20px rgba(0,230,118,.12)}50%{box-shadow:0 0 40px rgba(0,230,118,.25)}}
@keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
#app{max-width:480px;margin:0 auto;padding:0 16px 120px;padding-top:env(safe-area-inset-top);position:relative}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;height:100dvh;text-align:center;padding:20px;animation:fadeIn .6s ease}
.login-logo{font-family:'Space Mono',monospace;font-size:48px;font-weight:700;letter-spacing:8px;margin-bottom:4px}.login-logo .b{color:var(--green)}
.login-sub{font-size:11px;color:#555;letter-spacing:8px;margin-bottom:48px;font-family:'Space Mono',monospace}
.login-btn{display:flex;align-items:center;gap:12px;padding:16px 36px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all .3s ease}
.login-btn:hover{background:rgba(255,255,255,.1);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.login-btn:active{transform:scale(.97)}
.login-btn img{width:22px;height:22px}
.login-tagline{color:#444;font-size:12px;margin-top:32px}
.login-sync{color:var(--green);font-size:11px;margin-top:8px;font-family:'Space Mono',monospace;letter-spacing:1px}
.login-version{color:#333;font-size:9px;margin-top:24px;font-family:'Space Mono',monospace}
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 0 12px;animation:slideUp .5s ease}
.logo{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;letter-spacing:4px}.logo .b{color:var(--green)}
.logo-sub{display:block;font-size:8px;font-weight:400;color:#555;letter-spacing:6px;margin-top:-2px}
.user-bar{display:flex;align-items:center;gap:8px}
.user-avatar{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.1)}
.user-name{font-size:10px;color:#888;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.action-btn{background:rgba(255,255,255,.06);border:none;color:#666;font-size:10px;padding:4px 8px;border-radius:6px;cursor:pointer;font-family:'Space Mono',monospace;transition:all .2s}
.action-btn:hover{color:#ccc;background:rgba(255,255,255,.1)}
.action-btn:active{transform:scale(.95)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px;animation:pulse 2s ease infinite}
.nav-bar{display:flex;gap:4px;background:var(--card);border-radius:12px;padding:4px;margin-bottom:16px;animation:slideUp .5s ease .1s both}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 8px;border:none;background:transparent;color:var(--text-muted);font-size:12px;font-weight:500;border-radius:10px;cursor:pointer;transition:all .3s ease}
.nav-tab:hover{background:rgba(255,255,255,.05)}.nav-tab.active{background:rgba(0,230,118,.1);color:var(--green)}
.nav-tab:active{transform:scale(.95)}
.nav-tab .icon{font-size:18px}
.month-sel{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px;animation:slideUp .5s ease .15s both}
.month-arrow{background:rgba(255,255,255,.06);border:none;color:#888;font-size:20px;width:36px;height:36px;border-radius:50%;cursor:pointer;font-family:'Space Mono',monospace;transition:all .2s;display:flex;align-items:center;justify-content:center}
.month-arrow:hover{background:rgba(255,255,255,.1);color:#ccc}
.month-arrow:active{transform:scale(.9)}
.month-label{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:#ccc;min-width:110px;text-align:center}
.balance-card{background:linear-gradient(135deg,rgba(20,20,30,.95),rgba(10,10,20,.98));border:1px solid rgba(0,230,118,.15);border-radius:20px;padding:24px 20px;margin-bottom:16px;text-align:center;animation:glowPulse 3s ease infinite,slideUp .5s ease .2s both}
.balance-label{font-size:11px;color:var(--text-muted);letter-spacing:3px;text-transform:uppercase;font-family:'Space Mono',monospace}
.balance-amount{font-family:'Space Mono',monospace;font-size:34px;font-weight:700;margin-top:4px}
.balance-amount.pos{color:var(--green)}.balance-amount.neg{color:var(--red)}
.baht{font-size:16px;opacity:.5;margin-left:4px;font-weight:400}
.balance-row{display:flex;justify-content:center;gap:24px;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.06)}
.bal-s{display:flex;flex-direction:column;gap:4px;align-items:center}
.bal-s .l{font-size:12px}.bal-s .v{font-family:'Space Mono',monospace;font-size:15px;font-weight:700}
.bal-div{width:1px;height:30px;background:rgba(255,255,255,.1)}
.sc{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:20px;margin-bottom:16px;animation:fadeIn .4s ease}
.st{font-size:14px;font-weight:600;color:var(--text-dim);margin-bottom:16px}
.empty{color:var(--text-dark);text-align:center;padding:32px 0;font-size:14px}
.cc{display:flex;gap:6px;align-items:flex-end;height:120px}
.ccl{flex:1;display:flex;flex-direction:column;align-items:center;height:100%}
.cbw{flex:1;width:100%;display:flex;flex-direction:column;justify-content:flex-end;align-items:center}
.cb{width:70%;min-height:2px;border-radius:4px 4px 0 0;transition:all .3s;cursor:pointer;transform-origin:bottom;animation:barGrow .6s ease both}
.cb:hover{opacity:.8}.cb.i{background:linear-gradient(to top,#00C853,#69F0AE)}.cb.e{background:linear-gradient(to top,#D50000,#FF5252);margin-top:3px}
.cd{font-size:10px;color:#555;margin-top:6px;font-family:'Space Mono',monospace}
.cl{display:flex;justify-content:center;gap:16px;margin-top:12px;font-size:11px;color:var(--text-muted)}

.ti{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tf{flex:1;min-width:0}
.tc{font-size:14px;font-weight:500;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc .n{color:var(--text-muted);font-weight:400}
.tm{font-size:11px;color:#555;margin-top:2px;font-family:'Space Mono',monospace}
.ta{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;flex-shrink:0}
.ta.i{color:var(--green)}.ta.e{color:var(--red)}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ck{background:rgba(255,255,255,.04);border-radius:12px;padding:14px;border-left:3px solid;transition:all .3s}
.ck:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.ck:active{transform:scale(.97)}
.sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.si{background:rgba(255,255,255,.04);border-radius:12px;padding:14px;text-align:center}
.si .l{color:#888;font-size:11px}.si .v{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;margin-top:4px}
.fab{position:fixed;bottom:max(24px,env(safe-area-inset-bottom,24px));width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,#00C853,#00E676);color:#000;font-size:28px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(0,230,118,.4);transition:all .3s;z-index:100;display:flex;align-items:center;justify-content:center}
.fab:hover{filter:brightness(1.2);transform:translateY(-2px) scale(1.05)}.fab:active{transform:scale(.9)}
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:16px;padding-bottom:env(safe-area-inset-bottom,16px);animation:fadeIn .2s ease}
.md{background:#141420;border-radius:20px 20px 0 0;padding:20px 20px 32px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;border:1px solid rgba(255,255,255,.08);animation:slideUp .35s ease}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mt{font-size:18px;font-weight:700}
.cx{background:rgba(255,255,255,.06);border:none;color:#888;width:32px;height:32px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cx:hover{background:rgba(255,255,255,.12);color:#ccc}
.tt{display:flex;gap:8px;margin-bottom:16px}
.tb{flex:1;padding:10px 12px;border:1px solid rgba(255,255,255,.1);border-radius:10px;background:rgba(255,255,255,.04);color:#888;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.tb:active{transform:scale(.95)}
.tb.ea{background:rgba(255,82,82,.2);color:var(--red);border-color:var(--red)}
.tb.ia{background:rgba(0,230,118,.2);color:var(--green);border-color:var(--green)}
.aw{display:flex;align-items:center;background:rgba(255,255,255,.04);border-radius:12px;padding:8px 16px;margin-bottom:16px;border:1px solid rgba(255,255,255,.08)}
.ap{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--green);margin-right:8px}
.ai{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:28px;font-family:'Space Mono',monospace;font-weight:700;width:100%}
.cp{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.cb2{display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px;border:1px solid rgba(255,255,255,.08);border-radius:10px;background:rgba(255,255,255,.03);color:var(--text-dim);cursor:pointer;transition:all .2s}
.cb2:hover{background:rgba(255,255,255,.06)}.cb2:active{transform:scale(.92)}.cb2.sel{border-width:2px}
.cb2 .ci{font-size:20px}.cb2 .cll{font-size:11px;margin-top:2px}
.ni{width:100%;padding:12px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#fff;font-size:14px;outline:none;margin-bottom:12px}
.ni:focus{border-color:rgba(255,255,255,.2)}.ni::placeholder{color:#555}
.ib{width:100%;padding:10px 16px;background:rgba(255,255,255,.06);border:1px dashed rgba(255,255,255,.15);border-radius:10px;color:#888;font-size:13px;cursor:pointer;transition:all .2s;margin-bottom:12px}
.ib:hover{background:rgba(255,255,255,.08)}.ib:active{transform:scale(.97)}
.ipw{position:relative;display:inline-block;margin-bottom:12px}
.ip{max-width:100%;max-height:150px;border-radius:10px;border:1px solid rgba(255,255,255,.1)}
.ir{position:absolute;top:-6px;right:-6px;width:24px;height:24px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sb{width:100%;padding:14px;border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s}
.sb:hover{filter:brightness(1.15);transform:translateY(-1px)}.sb:active{transform:scale(.97)}
.sb.eb{background:linear-gradient(135deg,#D50000,#FF5252)}
.sb.ib2{background:linear-gradient(135deg,#00C853,#00E676)}
.sb.db{background:rgba(255,82,82,.15);color:var(--red)}
.sb.cb3{background:#333}
.dc{text-align:center;padding:16px 0}
.dr{display:flex;gap:8px;margin-top:12px}.dr .sb{flex:1}
.toast{position:fixed;top:max(20px,env(safe-area-inset-top,20px));left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;color:#fff;font-size:14px;font-weight:600;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:popIn .3s ease;pointer-events:none}
.toast.ok{background:rgba(0,230,118,.95)}.toast.err{background:rgba(255,82,82,.95)}
.footer{text-align:center;padding:24px 0;font-size:10px;font-family:'Space Mono',monospace;color:#333;letter-spacing:2px}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;height:100dvh}
.loading-icon{font-size:48px;animation:pulse 1.2s ease infinite}.loading-text{color:#888;margin-top:16px}
.sav{position:fixed;top:8px;right:8px;font-size:10px;color:#555;font-family:'Space Mono',monospace;z-index:50;display:flex;align-items:center;gap:4px}
.install-banner{background:linear-gradient(135deg,rgba(0,200,83,.12),rgba(0,230,118,.06));border:1px solid rgba(0,230,118,.2);border-radius:14px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;animation:slideUp .5s ease .3s both}
.install-banner .txt{font-size:12px;color:#aaa;flex:1}.install-banner .txt strong{color:var(--green)}
.install-banner .inst-btn{background:var(--green);color:#000;border:none;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.install-banner .inst-btn:active{transform:scale(.95)}
.install-banner .dismiss{background:none;border:none;color:#555;font-size:18px;cursor:pointer;padding:0 4px}
@media(max-width:400px){.balance-amount{font-size:28px}.si .v{font-size:18px}.cp{gap:6px}.cb2{padding:8px 2px}}
</style>
</head>
<body>
<div id="app"><div class="loading-screen"><div class="loading-icon">💸</div><p class="loading-text">กำลังโหลด...</p></div></div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
// Register Service Worker
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(e=>console.log('SW:',e))}

// PWA Install
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;render()});

firebase.initializeApp({
  apiKey:"AIzaSyBTis4V5KnXsN8TKtAfD5kOqbeI-pNnP4o",
  authDomain:"boom-finance-594c7.firebaseapp.com",
  projectId:"boom-finance-594c7",
  storageBucket:"boom-finance-594c7.firebasestorage.app",
  messagingSenderId:"346928311321",
  appId:"1:346928311321:web:c31fb2ec63c8c89daf8e88"
});
const auth=firebase.auth(),db=firebase.firestore();
db.enablePersistence({synchronizeTabs:true}).catch(e=>console.log("P:",e.code));

const CAT={
  income:[{id:"salary",label:"เงินเดือน",icon:"💰",color:"#00E676"},{id:"freelance",label:"ฟรีแลนซ์",icon:"💻",color:"#69F0AE"},{id:"investment",label:"ลงทุน",icon:"📈",color:"#B2FF59"},{id:"bonus",label:"โบนัส",icon:"🎁",color:"#CCFF90"},{id:"other_in",label:"อื่นๆ",icon:"✨",color:"#F4FF81"}],
  expense:[{id:"food",label:"อาหาร",icon:"🍜",color:"#FF5252"},{id:"transport",label:"เดินทาง",icon:"🚗",color:"#FF6E40"},{id:"shopping",label:"ช้อปปิ้ง",icon:"🛍️",color:"#FF9100"},{id:"bills",label:"บิล/ค่าน้ำไฟ",icon:"📄",color:"#FFAB40"},{id:"health",label:"สุขภาพ",icon:"💊",color:"#FFD740"},{id:"entertainment",label:"บันเทิง",icon:"🎮",color:"#FF4081"},{id:"education",label:"การศึกษา",icon:"📚",color:"#E040FB"},{id:"other_out",label:"อื่นๆ",icon:"📦",color:"#7C4DFF"}]
};
const MTH=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
const fmt=n=>Number(n||0).toLocaleString("th-TH",{minimumFractionDigits:0,maximumFractionDigits:2});
const fD=d=>new Date(d).toLocaleDateString("th-TH",{day:"numeric",month:"short",year:"2-digit"});
const fT=d=>new Date(d).toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});
const mK=d=>{const t=new Date(d);return`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}`};
const mL=k=>{const[y,m]=k.split("-");return`${MTH[parseInt(m)-1]} ${parseInt(y)+543}`};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>s?s.replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"):"";

let S={user:null,txs:[],view:"home",sm:mK(new Date()),sf:false,ft:"expense",fa:"",fc:"",fn:"",fi:null,vt:null,del:null,toast:null,loading:true,saving:false,dismissed:false};
let unsub=null;

auth.onAuthStateChanged(u=>{S.user=u;S.loading=false;if(u){listen()}else{if(unsub){unsub();unsub=null}S.txs=[];render()}});

function gLogin(){
  const p=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(p).catch(e=>{
    if(e.code==='auth/popup-blocked'||e.code==='auth/popup-closed-by-user')auth.signInWithRedirect(p);
    else toast("เข้าสู่ระบบไม่สำเร็จ","err");
  });
}
function gOut(){if(unsub){unsub();unsub=null}auth.signOut()}
function uC(){return db.collection("users").doc(S.user.uid).collection("transactions")}
function listen(){
  if(unsub)unsub();
  unsub=uC().orderBy("createdAt","desc").onSnapshot(snap=>{S.txs=snap.docs.map(d=>({id:d.id,...d.data()}));render()},e=>{console.error(e);toast("โหลดข้อมูลไม่สำเร็จ","err")});
}
async function addTx(tx){S.saving=true;render();try{await uC().doc(tx.id).set(tx);toast(tx.type==="income"?"บันทึกรายรับแล้ว ✨":"บันทึกรายจ่ายแล้ว 💸")}catch(e){toast("บันทึกไม่สำเร็จ","err")}S.saving=false}
async function delTx(id){try{await uC().doc(id).delete();toast("ลบรายการแล้ว 🗑️")}catch(e){toast("ลบไม่สำเร็จ","err")}}
function expD(){const b=new Blob([JSON.stringify({transactions:S.txs,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`boom-finance-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);toast("Export สำเร็จ 📁")}
function impD(){const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async ev=>{try{const d=JSON.parse(ev.target.result);if(d.transactions&&d.transactions.length>0){const batch=db.batch();const ids=new Set(S.txs.map(t=>t.id));let c=0;d.transactions.forEach(tx=>{if(!ids.has(tx.id)){batch.set(uC().doc(tx.id),tx);c++}});await batch.commit();toast(`Import สำเร็จ! (${c} รายการใหม่) ✅`)}}catch(err){toast("ไฟล์ไม่ถูกต้อง","err")}};r.readAsText(f)};inp.click()}
function toast(msg,type="ok"){S.toast={msg,type};render();setTimeout(()=>{S.toast=null;render()},2500)}
function gMT(){return S.txs.filter(t=>mK(t.createdAt)===S.sm)}
function gAM(){const m=[...new Set(S.txs.map(t=>mK(t.createdAt)))].sort().reverse();if(!m.includes(S.sm))m.unshift(S.sm);return m}

async function installPWA(){if(deferredPrompt){deferredPrompt.prompt();const r=await deferredPrompt.userChoice;if(r.outcome==='accepted')toast("ติดตั้งสำเร็จ! 🎉");deferredPrompt=null;render()}}

function render(){
  const app=document.getElementById("app");
  if(S.loading){app.innerHTML=`<div class="loading-screen"><div class="loading-icon">💸</div><p class="loading-text">กำลังโหลด...</p></div>`;return}
  if(!S.user){app.innerHTML=`<div class="login-screen"><div class="login-logo"><span class="b">฿</span>OOM</div><div class="login-sub">FINANCE</div><button class="login-btn" onclick="gLogin()"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">เข้าสู่ระบบด้วย Google</button><p class="login-tagline">จัดการรายรับรายจ่ายง่ายๆ ฟรี ปลอดภัย</p><p class="login-sync">🔄 SYNC ทุกเครื่อง · ข้อมูลเดียวกัน</p><p class="login-version">v2.0 PWA</p></div>`;return}

  const txs=gMT(),tI=txs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0),tO=txs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0),bal=tI-tO;
  let h="";
  if(S.toast)h+=`<div class="toast ${S.toast.type}">${esc(S.toast.msg)}</div>`;
  if(S.saving)h+=`<div class="sav"><span class="sync-dot"></span>syncing...</div>`;

  h+=`<div class="header"><div><div class="logo"><span class="b">฿</span>OOM<span class="logo-sub">FINANCE</span></div></div>
    <div class="user-bar"><span class="sync-dot" title="Synced"></span>
    ${S.user.photoURL?`<img class="user-avatar" src="${S.user.photoURL}" referrerpolicy="no-referrer">`:""}
    <div style="display:flex;flex-direction:column;gap:2px;align-items:flex-end">
      <span class="user-name">${esc(S.user.displayName||"")}</span>
      <div style="display:flex;gap:4px"><button onclick="expD()" class="action-btn">📤</button><button onclick="impD()" class="action-btn">📥</button><button onclick="gOut()" class="action-btn">ออก</button></div>
    </div></div></div>`;

  // Install banner
  if(deferredPrompt&&!S.dismissed){
    h+=`<div class="install-banner"><div class="txt">📱 <strong>ติดตั้งเป็น App</strong> ได้ไอคอนบนมือถือ เปิดเต็มจอ</div><button class="inst-btn" onclick="installPWA()">ติดตั้ง</button><button class="dismiss" onclick="S.dismissed=true;render()">✕</button></div>`;
  }

  const tabs=[{id:"home",l:"หน้าแรก",i:"⚡"},{id:"list",l:"รายการ",i:"📋"},{id:"stats",l:"สถิติ",i:"📊"}];
  h+=`<div class="nav-bar">${tabs.map(t=>`<button class="nav-tab ${S.view===t.id?"active":""}" onclick="S.view='${t.id}';render()"><span class="icon">${t.i}</span><span>${t.l}</span></button>`).join("")}</div>`;
  h+=`<div class="month-sel"><button class="month-arrow" onclick="chgM(-1)">‹</button><span class="month-label">${mL(S.sm)}</span><button class="month-arrow" onclick="chgM(1)">›</button></div>`;

  if(S.view==="home")h+=rHome(txs,tI,tO,bal);
  else if(S.view==="list")h+=rList(txs);
  else if(S.view==="stats")h+=rStats(txs,tI,tO,bal);

  h+=`<button class="fab" onclick="openF()" style="right:max(16px,calc(50% - 224px))">+</button>`;
  h+=`<div class="footer">BOOM FINANCE · <span style="color:var(--green)">฿</span> · <span style="color:#555">${S.txs.length} records · synced</span></div>`;
  if(S.sf)h+=rForm();
  if(S.vt)h+=rDet();
  app.innerHTML=h;
}

function rHome(txs,tI,tO,bal){
  let h=`<div class="balance-card"><div class="balance-label">ยอดคงเหลือ</div>
    <div class="balance-amount ${bal>=0?"pos":"neg"}">${bal>=0?"+":""}${fmt(bal)}<span class="baht">฿</span></div>
    <div class="balance-row"><div class="bal-s"><span class="l" style="color:var(--green)">▲ รายรับ</span><span class="v" style="color:var(--green)">${fmt(tI)}</span></div>
    <div class="bal-div"></div><div class="bal-s"><span class="l" style="color:var(--red)">▼ รายจ่าย</span><span class="v" style="color:var(--red)">${fmt(tO)}</span></div></div></div>`;

  const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);const dl=d.toLocaleDateString("th-TH",{weekday:"short"});
    const de=S.txs.filter(t=>t.type==="expense"&&t.createdAt.slice(0,10)===k).reduce((s,t)=>s+t.amount,0);
    const di=S.txs.filter(t=>t.type==="income"&&t.createdAt.slice(0,10)===k).reduce((s,t)=>s+t.amount,0);days.push({k,dl,de,di})}
  const mx=Math.max(...days.map(d=>Math.max(d.de,d.di)),1);
  h+=`<div class="sc"><h3 class="st">📊 7 วันล่าสุด</h3><div class="cc">`;
  days.forEach((d,i)=>{const iH=d.di>0?Math.max((d.di/mx)*100,4):0;const eH=d.de>0?Math.max((d.de/mx)*100,4):0;
    h+=`<div class="ccl"><div class="cbw">${iH>0?`<div class="cb i" style="height:${iH}%;animation-delay:${i*80}ms" title="฿${fmt(d.di)}"></div>`:""}${eH>0?`<div class="cb e" style="height:${eH}%;animation-delay:${i*80+50}ms" title="฿${fmt(d.de)}"></div>`:""}</div><span class="cd">${d.dl}</span></div>`});
  h+=`</div><div class="cl"><span><span style="color:var(--green)">■</span> รายรับ</span><span><span style="color:var(--red)">■</span> รายจ่าย</span></div></div>`;

  h+=`<div class="sc"><h3 class="st">⚡ ล่าสุด</h3>`;
  if(txs.length===0)h+=`<p class="empty">ยังไม่มีรายการเดือนนี้</p>`;
  else txs.slice(0,5).forEach((tx,i)=>{h+=rTx(tx,i)});
  h+=`</div>`;return h;
}
function rList(txs){let h=`<div class="sc"><h3 class="st">📋 รายการทั้งหมด — ${mL(S.sm)}</h3>`;if(txs.length===0)h+=`<p class="empty">ไม่มีรายการ</p>`;else txs.forEach((tx,i)=>{h+=rTx(tx,i,true)});h+=`</div>`;return h}
function rStats(txs,tI,tO,bal){
  let h="";const bC={};txs.filter(t=>t.type==="expense").forEach(t=>{if(!bC[t.category])bC[t.category]={...t,total:0,count:0};bC[t.category].total+=t.amount;bC[t.category].count+=1});
  h+=`<div class="sc"><h3 class="st">🏷️ รายจ่ายตามหมวดหมู่</h3>`;const ce=Object.values(bC).sort((a,b)=>b.total-a.total);
  if(ce.length===0)h+=`<p class="empty">ยังไม่มีรายจ่ายเดือนนี้</p>`;
  else{h+=`<div class="cg">`;ce.forEach((c,i)=>{const p=tO>0?((c.total/tO)*100).toFixed(0):0;
    h+=`<div class="ck" style="border-left-color:${c.categoryColor};animation:popIn .4s ease ${i*80}ms both"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:22px">${c.categoryIcon}</span><span style="font-family:'Space Mono',monospace;font-weight:700;font-size:13px;color:${c.categoryColor}">${p}%</span></div><div style="margin-top:8px"><div style="color:#ccc;font-size:13px;font-weight:500">${esc(c.categoryLabel)}</div><div style="font-family:'Space Mono',monospace;color:#fff;font-weight:700;font-size:16px;margin-top:2px">฿${fmt(c.total)}</div><div style="color:var(--text-muted);font-size:11px;margin-top:2px">${c.count} รายการ</div></div><div class="cat-bar-bg" style="height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:10px;overflow:hidden"><div style="height:100%;border-radius:2px;width:${p}%;background:${c.categoryColor};transition:width .6s ease"></div></div></div>`});h+=`</div>`}
  h+=`</div>`;
  const ec=txs.filter(t=>t.type==="expense").length;const avg=ec>0?tO/ec:0;const sr=tI>0?((bal/tI)*100).toFixed(0):0;
  h+=`<div class="sc"><h3 class="st">📈 สรุปเดือน ${mL(S.sm)}</h3><div class="sg">
    <div class="si"><div class="l">จำนวนรายการ</div><div class="v" style="color:#fff">${txs.length}</div></div>
    <div class="si"><div class="l">เฉลี่ย/รายจ่าย</div><div class="v" style="color:#FF9100">฿${fmt(avg)}</div></div>
    <div class="si"><div class="l">Savings Rate</div><div class="v" style="color:${sr>=0?"var(--green)":"var(--red)"}">${sr}%</div></div>
  </div></div>`;return h;
}
function rTx(tx,i,sn=false){
  return`<div class="tr" onclick="vTx('${tx.id}')" style="animation:slideUp .4s ease ${i*50}ms both"><div class="ti" style="background:${tx.categoryColor}22">${tx.categoryIcon}</div><div class="tf"><div class="tc">${esc(tx.categoryLabel)}${sn&&tx.note?`<span class="n"> — ${esc(tx.note)}</span>`:""}</div><div class="tm">${fD(tx.createdAt)} · ${fT(tx.createdAt)}${tx.image?" 📎":""}</div></div><div class="ta ${tx.type}">${tx.type==="income"?"+":"-"}${fmt(tx.amount)}</div></div>`;
}
function rForm(){
  const cats=CAT[S.ft];let h=`<div class="mo" onclick="cForm()"><div class="md" onclick="event.stopPropagation()">
    <div class="mh"><h2 class="mt">เพิ่มรายการ</h2><button class="cx" onclick="cForm()">✕</button></div>
    <div class="tt"><button class="tb ${S.ft==="expense"?"ea":""}" onclick="S.ft='expense';S.fc='';render()">💸 รายจ่าย</button><button class="tb ${S.ft==="income"?"ia":""}" onclick="S.ft='income';S.fc='';render()">💰 รายรับ</button></div>
    <div class="aw"><span class="ap">฿</span><input class="ai" type="number" inputmode="decimal" placeholder="0" value="${esc(S.fa)}" oninput="S.fa=this.value" id="aI"></div>
    <div class="cp">`;
  cats.forEach(c=>{const s=S.fc===c.id;h+=`<button class="cb2 ${s?"sel":""}" style="${s?`background:${c.color}33;border-color:${c.color};color:${c.color}`:""}" onclick="S.fc='${c.id}';render()"><span class="ci">${c.icon}</span><span class="cll">${c.label}</span></button>`});
  h+=`</div><input class="ni" type="text" placeholder="โน้ต (ไม่บังคับ)" value="${esc(S.fn)}" oninput="S.fn=this.value">
    <button class="ib" onclick="document.getElementById('fI').click()">📷 แนบรูปใบเสร็จ</button><input type="file" id="fI" accept="image/*" style="display:none" onchange="hImg(this)">`;
  if(S.fi)h+=`<div class="ipw"><img class="ip" src="${S.fi}"><button class="ir" onclick="S.fi=null;render()">✕</button></div>`;
  h+=`<button class="sb ${S.ft==="expense"?"eb":"ib2"}" onclick="sub()">${S.saving?"กำลังบันทึก...":"บันทึก"}</button></div></div>`;return h;
}
function rDet(){
  const tx=S.vt;let h=`<div class="mo" onclick="cDet()"><div class="md" onclick="event.stopPropagation()">
    <div class="mh"><h2 class="mt">รายละเอียด</h2><button class="cx" onclick="cDet()">✕</button></div>
    <div class="dc"><div style="font-size:48px;margin-bottom:8px">${tx.categoryIcon}</div><div style="color:var(--text-dim);font-size:14px">${esc(tx.categoryLabel)}</div>
    <div style="font-family:'Space Mono',monospace;font-size:32px;font-weight:700;margin-top:4px;color:${tx.type==="income"?"var(--green)":"var(--red)"}">${tx.type==="income"?"+":"-"}฿${fmt(tx.amount)}</div>
    <div style="color:var(--text-muted);font-size:12px;margin-top:8px">${fD(tx.createdAt)} · ${fT(tx.createdAt)}</div>
    ${tx.note?`<div style="margin-top:12px;padding:10px 16px;background:rgba(255,255,255,.05);border-radius:8px;color:#ccc;font-size:14px">${esc(tx.note)}</div>`:""}
    ${tx.image?`<img style="margin-top:16px;max-width:100%;max-height:250px;border-radius:12px;border:1px solid rgba(255,255,255,.1)" src="${tx.image}">`:""}
    </div>`;
  if(S.del===tx.id)h+=`<div class="dr"><button class="sb eb" onclick="cfDel('${tx.id}')">ยืนยันลบ</button><button class="sb cb3" onclick="S.del=null;render()">ยกเลิก</button></div>`;
  else h+=`<button class="sb db" onclick="S.del='${tx.id}';render()">🗑️ ลบรายการ</button>`;
  h+=`</div></div>`;return h;
}

function chgM(dir){const m=gAM();const i=m.indexOf(S.sm);if(dir===-1&&i<m.length-1)S.sm=m[i+1];else if(dir===1&&i>0)S.sm=m[i-1];else{const[y,mo]=S.sm.split("-").map(Number);const d=new Date(y,mo-1+dir,1);S.sm=mK(d)}render()}
function openF(){S.sf=true;S.ft="expense";S.fc="";S.fa="";S.fn="";S.fi=null;render();setTimeout(()=>{const e=document.getElementById("aI");if(e)e.focus()},100)}
function cForm(){S.sf=false;render()}
function hImg(input){const f=input.files[0];if(!f)return;if(f.size>2*1024*1024){toast("ไฟล์ใหญ่เกิน 2MB","err");return}
  const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement("canvas");const mx=800;let w=img.width,h=img.height;if(w>mx){h=h*mx/w;w=mx}c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);S.fi=c.toDataURL("image/jpeg",.6);render()};img.src=e.target.result};r.readAsDataURL(f)}
async function sub(){
  const ae=document.getElementById("aI");if(ae)S.fa=ae.value;
  const ne=document.querySelector(".ni");if(ne)S.fn=ne.value;
  if(!S.fa||!S.fc){toast("กรุณาใส่จำนวนเงินและหมวดหมู่","err");return}
  const all=[...CAT.income,...CAT.expense];const cat=all.find(c=>c.id===S.fc);
  const tx={id:uid(),type:S.ft,amount:parseFloat(S.fa),category:S.fc,categoryLabel:cat?.label||"",categoryIcon:cat?.icon||"",categoryColor:cat?.color||"#888",note:S.fn,image:S.fi,createdAt:new Date().toISOString()};
  S.sf=false;await addTx(tx);
}
function vTx(id){S.vt=S.txs.find(t=>t.id===id);S.del=null;render()}
function cDet(){S.vt=null;S.del=null;render()}
async function cfDel(id){await delTx(id);S.vt=null;S.del=null}

render();
</script>
</body>
</html>
