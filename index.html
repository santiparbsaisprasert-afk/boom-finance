<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0A0F;--card:rgba(255,255,255,0.03);--card-border:rgba(255,255,255,0.06);--green:#00E676;--green-dark:#00C853;--red:#FF5252;--red-dark:#D50000;--text:#fff;--text-dim:#aaa;--text-muted:#666;--text-dark:#444;--accent:#00E676}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Noto Sans Thai',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
input,textarea,select,button{font-family:'Noto Sans Thai',sans-serif}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes popIn{0%{opacity:0;transform:scale(.85)}100%{opacity:1;transform:scale(1)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 20px rgba(0,230,118,.12)}50%{box-shadow:0 0 40px rgba(0,230,118,.25)}}
@keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
#app{max-width:480px;margin:0 auto;padding:0 16px 120px;position:relative}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center;padding:20px;animation:fadeIn .6s ease}
.login-logo{font-family:'Space Mono',monospace;font-size:42px;font-weight:700;letter-spacing:6px;margin-bottom:4px}.login-logo .b{color:var(--green)}
.login-sub{font-size:11px;color:#555;letter-spacing:8px;margin-bottom:48px;font-family:'Space Mono',monospace}
.login-btn{display:flex;align-items:center;gap:12px;padding:14px 32px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all .3s ease}
.login-btn:hover{background:rgba(255,255,255,.1);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.login-btn img{width:22px;height:22px}
.login-tagline{color:#444;font-size:12px;margin-top:24px}
.login-sync{color:var(--green);font-size:11px;margin-top:8px;font-family:'Space Mono',monospace;letter-spacing:1px}
.header{display:flex;justify-content:space-between;align-items:center;padding:20px 0 12px;animation:slideUp .5s ease}
.logo{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;letter-spacing:4px}.logo .b{color:var(--green)}
.logo-sub{display:block;font-size:9px;font-weight:400;color:#555;letter-spacing:6px;margin-top:-2px}
.user-bar{display:flex;align-items:center;gap:8px}
.user-avatar{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.1)}
.user-name{font-size:11px;color:#888;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{background:rgba(255,255,255,.06);border:none;color:#666;font-size:10px;padding:4px 8px;border-radius:6px;cursor:pointer;font-family:'Space Mono',monospace}
.logout-btn:hover{color:var(--red);background:rgba(255,82,82,.1)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px;animation:pulse 2s ease infinite}
.nav-bar{display:flex;gap:4px;background:var(--card);border-radius:12px;padding:4px;margin-bottom:16px;animation:slideUp .5s ease .1s both}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 8px;border:none;background:transparent;color:var(--text-muted);font-size:12px;font-weight:500;border-radius:10px;cursor:pointer;transition:all .3s ease}
.nav-tab:hover{background:rgba(255,255,255,.05)}.nav-tab.active{background:rgba(0,230,118,.1);color:var(--green)}
.nav-tab .icon{font-size:18px}
.month-sel{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px;animation:slideUp .5s ease .15s both}
.month-arrow{background:rgba(255,255,255,.06);border:none;color:#888;font-size:20px;width:36px;height:36px;border-radius:50%;cursor:pointer;font-family:'Space Mono',monospace;transition:all .2s;display:flex;align-items:center;justify-content:center}
.month-arrow:hover{background:rgba(255,255,255,.1);color:#ccc}
.month-label{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:#ccc;min-width:110px;text-align:center}
.balance-card{background:linear-gradient(135deg,rgba(20,20,30,.95),rgba(10,10,20,.98));border:1px solid rgba(0,230,118,.15);border-radius:20px;padding:24px 20px;margin-bottom:16px;text-align:center;animation:glowPulse 3s ease infinite,slideUp .5s ease .2s both}
.balance-label{font-size:12px;color:var(--text-muted);letter-spacing:3px;text-transform:uppercase;font-family:'Space Mono',monospace}
.balance-amount{font-family:'Space Mono',monospace;font-size:36px;font-weight:700;margin-top:4px}
.balance-amount.positive{color:var(--green)}.balance-amount.negative{color:var(--red)}
.baht-sign{font-size:18px;opacity:.5;margin-left:4px;font-weight:400}
.balance-row{display:flex;justify-content:center;gap:24px;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.06)}

.balance-stat .label{font-size:13px}.balance-stat .value{font-family:'Space Mono',monospace;font-size:16px;font-weight:700}
.balance-divider{width:1px;height:30px;background:rgba(255,255,255,.1)}
.section-card{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:20px;margin-bottom:16px;animation:fadeIn .4s ease}
.section-title{font-size:14px;font-weight:600;color:var(--text-dim);margin-bottom:16px}
.empty-text{color:var(--text-dark);text-align:center;padding:32px 0;font-size:14px}
.chart-container{display:flex;gap:6px;align-items:flex-end;height:120px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%}
.chart-bar-wrap{flex:1;width:100%;display:flex;flex-direction:column;justify-content:flex-end;align-items:center}
.chart-bar{width:70%;min-height:2px;border-radius:4px 4px 0 0;transition:all .3s ease;cursor:pointer;transform-origin:bottom;animation:barGrow .6s ease both}
.chart-bar:hover{opacity:.8}
.chart-bar.income{background:linear-gradient(to top,#00C853,#69F0AE)}
.chart-bar.expense{background:linear-gradient(to top,#D50000,#FF5252);margin-top:3px}
.chart-day{font-size:10px;color:#555;margin-top:6px;font-family:'Space Mono',monospace}
.chart-legend{display:flex;justify-content:center;gap:16px;margin-top:12px;font-size:11px;color:var(--text-muted)}
.tx-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .2s ease}
.tx-row:hover{background:rgba(255,255,255,.04)}.tx-row:last-child{border-bottom:none}
.tx-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-cat{font-size:14px;font-weight:500;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-cat .note{color:var(--text-muted);font-weight:400}
.tx-meta{font-size:11px;color:#555;margin-top:2px;font-family:'Space Mono',monospace}
.tx-amount{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;flex-shrink:0}
.tx-amount.income{color:var(--green)}.tx-amount.expense{color:var(--red)}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-card{background:rgba(255,255,255,.04);border-radius:12px;padding:14px;border-left:3px solid;transition:all .3s ease}
.cat-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.cat-head{display:flex;justify-content:space-between;align-items:center}.cat-icon{font-size:22px}
.cat-pct{font-family:'Space Mono',monospace;font-weight:700;font-size:13px}
.cat-body{margin-top:8px}.cat-label{color:#ccc;font-size:13px;font-weight:500}
.cat-total{font-family:'Space Mono',monospace;color:#fff;font-weight:700;font-size:16px;margin-top:2px}
.cat-count{color:var(--text-muted);font-size:11px;margin-top:2px}
.cat-bar-bg{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:10px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.summary-item{background:rgba(255,255,255,.04);border-radius:12px;padding:14px;text-align:center}
.summary-item .label{color:#888;font-size:12px}
.summary-item .value{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;margin-top:4px}
.fab{position:fixed;bottom:24px;width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,#00C853,#00E676);color:#000;font-size:28px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(0,230,118,.4);transition:all .3s ease;z-index:100;display:flex;align-items:center;justify-content:center}
.fab:hover{filter:brightness(1.2);transform:translateY(-2px) scale(1.05)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:16px;animation:fadeIn .2s ease}
.modal{background:#141420;border-radius:20px 20px 0 0;padding:20px 20px 32px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;border:1px solid rgba(255,255,255,.08);animation:slideUp .35s ease}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:18px;font-weight:700}
.close-btn{background:rgba(255,255,255,.06);border:none;color:#888;width:32px;height:32px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.close-btn:hover{background:rgba(255,255,255,.12);color:#ccc}
.type-toggle{display:flex;gap:8px;margin-bottom:16px}
.type-btn{flex:1;padding:10px 12px;border:1px solid rgba(255,255,255,.1);border-radius:10px;background:rgba(255,255,255,.04);color:#888;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.type-btn.expense-active{background:rgba(255,82,82,.2);color:var(--red);border-color:var(--red)}
.type-btn.income-active{background:rgba(0,230,118,.2);color:var(--green);border-color:var(--green)}
.amount-wrap{display:flex;align-items:center;background:rgba(255,255,255,.04);border-radius:12px;padding:8px 16px;margin-bottom:16px;border:1px solid rgba(255,255,255,.08)}
.amount-prefix{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--green);margin-right:8px}
.amount-input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:28px;font-family:'Space Mono',monospace;font-weight:700;width:100%}
.cat-picker{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.cat-pick-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px;border:1px solid rgba(255,255,255,.08);border-radius:10px;background:rgba(255,255,255,.03);color:var(--text-dim);cursor:pointer;transition:all .2s}
.cat-pick-btn:hover{background:rgba(255,255,255,.06)}.cat-pick-btn.selected{border-width:2px}
.cat-pick-btn .ci{font-size:20px}.cat-pick-btn .cl{font-size:11px;margin-top:2px}
.note-input{width:100%;padding:12px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#fff;font-size:14px;outline:none;margin-bottom:12px;transition:border-color .2s}
.note-input:focus{border-color:rgba(255,255,255,.2)}.note-input::placeholder{color:#555}
.image-btn{width:100%;padding:10px 16px;background:rgba(255,255,255,.06);border:1px dashed rgba(255,255,255,.15);border-radius:10px;color:#888;font-size:13px;cursor:pointer;transition:all .2s;margin-bottom:12px}
.image-btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.25)}
.img-preview-wrap{position:relative;display:inline-block;margin-bottom:12px}
.img-preview{max-width:100%;max-height:150px;border-radius:10px;border:1px solid rgba(255,255,255,.1)}
.img-remove{position:absolute;top:-6px;right:-6px;width:24px;height:24px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.submit-btn{width:100%;padding:14px;border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s ease}
.submit-btn:hover{filter:brightness(1.15);transform:translateY(-1px)}
.submit-btn.expense-bg{background:linear-gradient(135deg,#D50000,#FF5252)}
.submit-btn.income-bg{background:linear-gradient(135deg,#00C853,#00E676)}
.submit-btn.delete-bg{background:rgba(255,82,82,.15);color:var(--red)}
.submit-btn.cancel-bg{background:#333}
.detail-center{text-align:center;padding:16px 0}.detail-icon{font-size:48px;margin-bottom:8px}
.detail-cat{color:var(--text-dim);font-size:14px}
.detail-amount{font-family:'Space Mono',monospace;font-size:32px;font-weight:700;margin-top:4px}
.detail-date{color:var(--text-muted);font-size:12px;margin-top:8px}
.detail-note{margin-top:12px;padding:10px 16px;background:rgba(255,255,255,.05);border-radius:8px;color:#ccc;font-size:14px}
.detail-img{margin-top:16px;max-width:100%;max-height:250px;border-radius:12px;border:1px solid rgba(255,255,255,.1)}
.delete-row{display:flex;gap:8px;margin-top:12px}.delete-row .submit-btn{flex:1}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;color:#fff;font-size:14px;font-weight:600;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:popIn .3s ease;pointer-events:none}
.toast.success{background:rgba(0,230,118,.95)}.toast.error{background:rgba(255,82,82,.95)}
.footer{text-align:center;padding:24px 0;font-size:10px;font-family:'Space Mono',monospace;color:#333;letter-spacing:2px}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
.loading-icon{font-size:48px;animation:pulse 1.2s ease infinite}.loading-text{color:#888;margin-top:16px}
.saving-indicator{position:fixed;top:8px;right:8px;font-size:10px;color:#555;font-family:'Space Mono',monospace;z-index:50;display:flex;align-items:center;gap:4px}
@media(max-width:400px){.balance-amount{font-size:28px}.summary-item .value{font-size:18px}.cat-picker{gap:6px}.cat-pick-btn{padding:8px 2px}}
</style>
</head>
<body>
<div id="app"><div class="loading-screen"><div class="loading-icon">💸</div><p class="loading-text">กำลังโหลด...</p></div></div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBTis4V5KnXsN8TKtAfD5kOqbeI-pNnP4o",
  authDomain:"boom-finance-594c7.firebaseapp.com",
  projectId:"boom-finance-594c7",
  storageBucket:"boom-finance-594c7.firebasestorage.app",
  messagingSenderId:"346928311321",
  appId:"1:346928311321:web:c31fb2ec63c8c89daf8e88"
});
const auth=firebase.auth(),db=firebase.firestore();
db.enablePersistence({synchronizeTabs:true}).catch(e=>console.log("Persistence:",e.code));

const CATEGORIES={
  income:[{id:"salary",label:"เงินเดือน",icon:"💰",color:"#00E676"},{id:"freelance",label:"ฟรีแลนซ์",icon:"💻",color:"#69F0AE"},{id:"investment",label:"ลงทุน",icon:"📈",color:"#B2FF59"},{id:"bonus",label:"โบนัส",icon:"🎁",color:"#CCFF90"},{id:"other_in",label:"อื่นๆ",icon:"✨",color:"#F4FF81"}],
  expense:[{id:"food",label:"อาหาร",icon:"🍜",color:"#FF5252"},{id:"transport",label:"เดินทาง",icon:"🚗",color:"#FF6E40"},{id:"shopping",label:"ช้อปปิ้ง",icon:"🛍️",color:"#FF9100"},{id:"bills",label:"บิล/ค่าน้ำไฟ",icon:"📄",color:"#FFAB40"},{id:"health",label:"สุขภาพ",icon:"💊",color:"#FFD740"},{id:"entertainment",label:"บันเทิง",icon:"🎮",color:"#FF4081"},{id:"education",label:"การศึกษา",icon:"📚",color:"#E040FB"},{id:"other_out",label:"อื่นๆ",icon:"📦",color:"#7C4DFF"}]
};
const MTH=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
const fmt=n=>Number(n||0).toLocaleString("th-TH",{minimumFractionDigits:0,maximumFractionDigits:2});
const fD=d=>new Date(d).toLocaleDateString("th-TH",{day:"numeric",month:"short",year:"2-digit"});
const fT=d=>new Date(d).toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});
const mK=d=>{const t=new Date(d);return`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}`};
const mL=k=>{const[y,m]=k.split("-");return`${MTH[parseInt(m)-1]} ${parseInt(y)+543}`};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>s?s.replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"):"";

let S={user:null,transactions:[],view:"home",selectedMonth:mK(new Date()),showForm:false,formType:"expense",formAmount:"",formCategory:"",formNote:"",formImage:null,viewingTx:null,deleting:null,toast:null,loading:true,saving:false};
let unsub=null;

auth.onAuthStateChanged(u=>{S.user=u;S.loading=false;if(u){listen()}else{if(unsub){unsub();unsub=null}S.transactions=[];render()}});

function googleLogin(){
  const p=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(p).catch(e=>{
    if(e.code==='auth/popup-blocked'||e.code==='auth/popup-closed-by-user')auth.signInWithRedirect(p);
    else showToast("เข้าสู่ระบบไม่สำเร็จ","error");
  });
}
function logout(){if(unsub){unsub();unsub=null}auth.signOut()}
function uCol(){return db.collection("users").doc(S.user.uid).collection("transactions")}

function listen(){
  if(unsub)unsub();
  unsub=uCol().orderBy("createdAt","desc").onSnapshot(snap=>{
    S.transactions=snap.docs.map(d=>({id:d.id,...d.data()}));render();
  },e=>{console.error(e);showToast("โหลดข้อมูลไม่สำเร็จ","error")});
}

async function addTx(tx){S.saving=true;render();try{await uCol().doc(tx.id).set(tx);showToast(tx.type==="income"?"บันทึกรายรับแล้ว ✨":"บันทึกรายจ่ายแล้ว 💸")}catch(e){showToast("บันทึกไม่สำเร็จ","error")}S.saving=false}
async function delTx(id){try{await uCol().doc(id).delete();showToast("ลบรายการแล้ว 🗑️")}catch(e){showToast("ลบไม่สำเร็จ","error")}}

function exportData(){
  const b=new Blob([JSON.stringify({transactions:S.transactions,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});
  const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`boom-finance-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);showToast("Export สำเร็จ 📁");
}
function importData(){
  const inp=document.createElement("input");inp.type="file";inp.accept=".json";
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=async ev=>{try{const d=JSON.parse(ev.target.result);if(d.transactions&&d.transactions.length>0){const batch=db.batch();const ids=new Set(S.transactions.map(t=>t.id));let c=0;d.transactions.forEach(tx=>{if(!ids.has(tx.id)){batch.set(uCol().doc(tx.id),tx);c++}});await batch.commit();showToast(`Import สำเร็จ! (${c} รายการใหม่) ✅`)}}catch(err){showToast("ไฟล์ไม่ถูกต้อง","error")}};
    r.readAsText(f)};inp.click();
}

function showToast(msg,type="success"){S.toast={msg,type};render();setTimeout(()=>{S.toast=null;render()},2500)}
function gMT(){return S.transactions.filter(t=>mK(t.createdAt)===S.selectedMonth)}
function gAM(){const m=[...new Set(S.transactions.map(t=>mK(t.createdAt)))].sort().reverse();if(!m.includes(S.selectedMonth))m.unshift(S.selectedMonth);return m}

function render(){
  const app=document.getElementById("app");
  if(S.loading){app.innerHTML=`<div class="loading-screen"><div class="loading-icon">💸</div><p class="loading-text">กำลังโหลด...</p></div>`;return}
  if(!S.user){app.innerHTML=`<div class="login-screen"><div class="login-logo"><span class="b">฿</span>OOM</div><div class="login-sub">FINANCE</div><button class="login-btn" onclick="googleLogin()"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">เข้าสู่ระบบด้วย Google</button><p class="login-tagline">จัดการรายรับรายจ่ายง่ายๆ ฟรี ปลอดภัย</p><p class="login-sync">🔄 SYNC ทุกเครื่อง · ข้อมูลเดียวกัน</p></div>`;return}

  const txs=gMT(),tI=txs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0),tO=txs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0),bal=tI-tO;
  let h="";
  if(S.toast)h+=`<div class="toast ${S.toast.type}">${esc(S.toast.msg)}</div>`;
  if(S.saving)h+=`<div class="saving-indicator"><span class="sync-dot"></span>syncing...</div>`;

  h+=`<div class="header"><div><div class="logo"><span class="b">฿</span>OOM<span class="logo-sub">FINANCE</span></div></div>
    <div class="user-bar"><span class="sync-dot" title="Synced"></span>
    ${S.user.photoURL?`<img class="user-avatar" src="${S.user.photoURL}" referrerpolicy="no-referrer">`:""}
    <div style="display:flex;flex-direction:column;gap:2px;align-items:flex-end">
      <span class="user-name">${esc(S.user.displayName||"")}</span>
      <div style="display:flex;gap:4px"><button onclick="exportData()" class="logout-btn">📤</button><button onclick="importData()" class="logout-btn">📥</button><button onclick="logout()" class="logout-btn">ออก</button></div>
    </div></div></div>`;

  const tabs=[{id:"home",l:"หน้าแรก",i:"⚡"},{id:"list",l:"รายการ",i:"📋"},{id:"stats",l:"สถิติ",i:"📊"}];
  h+=`<div class="nav-bar">${tabs.map(t=>`<button class="nav-tab ${S.view===t.id?"active":""}" onclick="switchView('${t.id}')"><span class="icon">${t.i}</span><span>${t.l}</span></button>`).join("")}</div>`;
  h+=`<div class="month-sel"><button class="month-arrow" onclick="chgM(-1)">‹</button><span class="month-label">${mL(S.selectedMonth)}</span><button class="month-arrow" onclick="chgM(1)">›</button></div>`;

  if(S.view==="home")h+=rHome(txs,tI,tO,bal);
  else if(S.view==="list")h+=rList(txs);
  else if(S.view==="stats")h+=rStats(txs,tI,tO,bal);

  h+=`<button class="fab" onclick="openForm()" style="right:max(16px,calc(50% - 224px))">+</button>`;
  h+=`<div class="footer">BOOM FINANCE · <span style="color:var(--green)">฿</span> · <span style="color:#555">${S.transactions.length} records · synced</span></div>`;
  if(S.showForm)h+=rForm();
  if(S.viewingTx)h+=rDetail();
  app.innerHTML=h;
}

function rHome(txs,tI,tO,bal){
  let h=`<div class="balance-card"><div class="balance-label">ยอดคงเหลือ</div>
    <div class="balance-amount ${bal>=0?"positive":"negative"}">${bal>=0?"+":""}${fmt(bal)}<span class="baht-sign">฿</span></div>
    <div class="balance-row"><div class="balance-stat"><span class="label" style="color:var(--green)">▲ รายรับ</span><span class="value" style="color:var(--green)">${fmt(tI)}</span></div>
    <div class="balance-divider"></div><div class="balance-stat"><span class="label" style="color:var(--red)">▼ รายจ่าย</span><span class="value" style="color:var(--red)">${fmt(tO)}</span></div></div></div>`;

  const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);const dl=d.toLocaleDateString("th-TH",{weekday:"short"});
    const de=S.transactions.filter(t=>t.type==="expense"&&t.createdAt.slice(0,10)===k).reduce((s,t)=>s+t.amount,0);
    const di=S.transactions.filter(t=>t.type==="income"&&t.createdAt.slice(0,10)===k).reduce((s,t)=>s+t.amount,0);
    days.push({k,dl,de,di})}
  const mx=Math.max(...days.map(d=>Math.max(d.de,d.di)),1);
  h+=`<div class="section-card"><h3 class="section-title">📊 7 วันล่าสุด</h3><div class="chart-container">`;
  days.forEach((d,i)=>{const iH=d.di>0?Math.max((d.di/mx)*100,4):0;const eH=d.de>0?Math.max((d.de/mx)*100,4):0;
    h+=`<div class="chart-col"><div class="chart-bar-wrap">${iH>0?`<div class="chart-bar income" style="height:${iH}%;animation-delay:${i*80}ms" title="รายรับ: ฿${fmt(d.di)}"></div>`:""}${eH>0?`<div class="chart-bar expense" style="height:${eH}%;animation-delay:${i*80+50}ms" title="รายจ่าย: ฿${fmt(d.de)}"></div>`:""}</div><span class="chart-day">${d.dl}</span></div>`});
  h+=`</div><div class="chart-legend"><span><span style="color:var(--green)">■</span> รายรับ</span><span><span style="color:var(--red)">■</span> รายจ่าย</span></div></div>`;

  h+=`<div class="section-card"><h3 class="section-title">⚡ ล่าสุด</h3>`;
  if(txs.length===0)h+=`<p class="empty-text">ยังไม่มีรายการเดือนนี้</p>`;
  else txs.slice(0,5).forEach((tx,i)=>{h+=rTx(tx,i)});
  h+=`</div>`;return h;
}

function rList(txs){
  let h=`<div class="section-card"><h3 class="section-title">📋 รายการทั้งหมด — ${mL(S.selectedMonth)}</h3>`;
  if(txs.length===0)h+=`<p class="empty-text">ไม่มีรายการ</p>`;
  else txs.forEach((tx,i)=>{h+=rTx(tx,i,true)});
  h+=`</div>`;return h;
}

function rStats(txs,tI,tO,bal){
  let h="";const bC={};
  txs.filter(t=>t.type==="expense").forEach(t=>{if(!bC[t.category])bC[t.category]={...t,total:0,count:0};bC[t.category].total+=t.amount;bC[t.category].count+=1});
  h+=`<div class="section-card"><h3 class="section-title">🏷️ รายจ่ายตามหมวดหมู่</h3>`;
  const ce=Object.values(bC).sort((a,b)=>b.total-a.total);
  if(ce.length===0)h+=`<p class="empty-text">ยังไม่มีรายจ่ายเดือนนี้</p>`;
  else{h+=`<div class="cat-grid">`;ce.forEach((c,i)=>{const p=tO>0?((c.total/tO)*100).toFixed(0):0;
    h+=`<div class="cat-card" style="border-left-color:${c.categoryColor};animation:popIn .4s ease ${i*80}ms both"><div class="cat-head"><span class="cat-icon">${c.categoryIcon}</span><span class="cat-pct" style="color:${c.categoryColor}">${p}%</span></div><div class="cat-body"><div class="cat-label">${esc(c.categoryLabel)}</div><div class="cat-total">฿${fmt(c.total)}</div><div class="cat-count">${c.count} รายการ</div></div><div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${p}%;background:${c.categoryColor}"></div></div></div>`});
    h+=`</div>`}
  h+=`</div>`;
  const ec=txs.filter(t=>t.type==="expense").length;const avg=ec>0?tO/ec:0;const sr=tI>0?((bal/tI)*100).toFixed(0):0;
  h+=`<div class="section-card"><h3 class="section-title">📈 สรุปเดือน ${mL(S.selectedMonth)}</h3><div class="summary-grid">
    <div class="summary-item"><div class="label">จำนวนรายการ</div><div class="value" style="color:#fff">${txs.length}</div></div>
    <div class="summary-item"><div class="label">เฉลี่ย/รายจ่าย</div><div class="value" style="color:#FF9100">฿${fmt(avg)}</div></div>
    <div class="summary-item"><div class="label">Savings Rate</div><div class="value" style="color:${sr>=0?"var(--green)":"var(--red)"}">${sr}%</div></div>
  </div></div>`;return h;
}

function rTx(tx,i,sn=false){
  return`<div class="tx-row" onclick="vTx('${tx.id}')" style="animation:slideUp .4s ease ${i*50}ms both"><div class="tx-icon" style="background:${tx.categoryColor}22">${tx.categoryIcon}</div><div class="tx-info"><div class="tx-cat">${esc(tx.categoryLabel)}${sn&&tx.note?`<span class="note"> — ${esc(tx.note)}</span>`:""}</div><div class="tx-meta">${fD(tx.createdAt)} · ${fT(tx.createdAt)}${tx.image?" 📎":""}</div></div><div class="tx-amount ${tx.type}">${tx.type==="income"?"+":"-"}${fmt(tx.amount)}</div></div>`;
}

function rForm(){
  const cats=CATEGORIES[S.formType];
  let h=`<div class="modal-overlay" onclick="cForm()"><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header"><h2 class="modal-title">เพิ่มรายการ</h2><button class="close-btn" onclick="cForm()">✕</button></div>
    <div class="type-toggle"><button class="type-btn ${S.formType==="expense"?"expense-active":""}" onclick="sFT('expense')">💸 รายจ่าย</button><button class="type-btn ${S.formType==="income"?"income-active":""}" onclick="sFT('income')">💰 รายรับ</button></div>
    <div class="amount-wrap"><span class="amount-prefix">฿</span><input class="amount-input" type="number" inputmode="decimal" placeholder="0" value="${esc(S.formAmount)}" oninput="S.formAmount=this.value" id="aI"></div>
    <div class="cat-picker">`;
  cats.forEach(c=>{const s=S.formCategory===c.id;h+=`<button class="cat-pick-btn ${s?"selected":""}" style="${s?`background:${c.color}33;border-color:${c.color};color:${c.color}`:""}" onclick="pC('${c.id}')"><span class="ci">${c.icon}</span><span class="cl">${c.label}</span></button>`});
  h+=`</div><input class="note-input" type="text" placeholder="โน้ต (ไม่บังคับ)" value="${esc(S.formNote)}" oninput="S.formNote=this.value">
    <button class="image-btn" onclick="pImg()">📷 แนบรูปใบเสร็จ</button><input type="file" id="fI" accept="image/*" style="display:none" onchange="hImg(this)">`;
  if(S.formImage)h+=`<div class="img-preview-wrap"><img class="img-preview" src="${S.formImage}"><button class="img-remove" onclick="rImg()">✕</button></div>`;
  h+=`<button class="submit-btn ${S.formType==="expense"?"expense-bg":"income-bg"}" onclick="sub()">${S.saving?"กำลังบันทึก...":"บันทึก"}</button></div></div>`;return h;
}

function rDetail(){
  const tx=S.viewingTx;
  let h=`<div class="modal-overlay" onclick="cDet()"><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header"><h2 class="modal-title">รายละเอียด</h2><button class="close-btn" onclick="cDet()">✕</button></div>
    <div class="detail-center"><div class="detail-icon">${tx.categoryIcon}</div><div class="detail-cat">${esc(tx.categoryLabel)}</div>
    <div class="detail-amount" style="color:${tx.type==="income"?"var(--green)":"var(--red)"}">${tx.type==="income"?"+":"-"}฿${fmt(tx.amount)}</div>
    <div class="detail-date">${fD(tx.createdAt)} · ${fT(tx.createdAt)}</div>
    ${tx.note?`<div class="detail-note">${esc(tx.note)}</div>`:""}
    ${tx.image?`<img class="detail-img" src="${tx.image}">`:""}
    </div>`;
  if(S.deleting===tx.id)h+=`<div class="delete-row"><button class="submit-btn expense-bg" onclick="cfDel('${tx.id}')">ยืนยันลบ</button><button class="submit-btn cancel-bg" onclick="cnDel()">ยกเลิก</button></div>`;
  else h+=`<button class="submit-btn delete-bg" onclick="stDel('${tx.id}')">🗑️ ลบรายการ</button>`;
  h+=`</div></div>`;return h;
}

function switchView(v){S.view=v;render()}
function chgM(dir){const m=gAM();const i=m.indexOf(S.selectedMonth);if(dir===-1&&i<m.length-1)S.selectedMonth=m[i+1];else if(dir===1&&i>0)S.selectedMonth=m[i-1];else{const[y,mo]=S.selectedMonth.split("-").map(Number);const d=new Date(y,mo-1+dir,1);S.selectedMonth=mK(d)}render()}
function openForm(){S.showForm=true;S.formType="expense";S.formCategory="";S.formAmount="";S.formNote="";S.formImage=null;render();setTimeout(()=>{const e=document.getElementById("aI");if(e)e.focus()},100)}
function cForm(){S.showForm=false;render()}
function sFT(t){S.formType=t;S.formCategory="";render()}
function pC(id){S.formCategory=id;render()}
function pImg(){document.getElementById("fI").click()}
function hImg(input){const f=input.files[0];if(!f)return;if(f.size>2*1024*1024){showToast("ไฟล์ใหญ่เกิน 2MB","error");return}
  const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement("canvas");const mx=800;let w=img.width,h=img.height;if(w>mx){h=h*mx/w;w=mx}c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);S.formImage=c.toDataURL("image/jpeg",.6);render()};img.src=e.target.result};r.readAsDataURL(f)}
function rImg(){S.formImage=null;render()}

async function sub(){
  const ae=document.getElementById("aI");if(ae)S.formAmount=ae.value;
  const ne=document.querySelector(".note-input");if(ne)S.formNote=ne.value;
  if(!S.formAmount||!S.formCategory){showToast("กรุณาใส่จำนวนเงินและหมวดหมู่","error");return}
  const all=[...CATEGORIES.income,...CATEGORIES.expense];const cat=all.find(c=>c.id===S.formCategory);
  const tx={id:uid(),type:S.formType,amount:parseFloat(S.formAmount),category:S.formCategory,categoryLabel:cat?.label||"",categoryIcon:cat?.icon||"",categoryColor:cat?.color||"#888",note:S.formNote,image:S.formImage,createdAt:new Date().toISOString()};
  S.showForm=false;await addTx(tx);
}
function vTx(id){S.viewingTx=S.transactions.find(t=>t.id===id);S.deleting=null;render()}
function cDet(){S.viewingTx=null;S.deleting=null;render()}
function stDel(id){S.deleting=id;render()}
function cnDel(){S.deleting=null;render()}
async function cfDel(id){await delTx(id);S.viewingTx=null;S.deleting=null}

render();
</script>
</body>
</html>
